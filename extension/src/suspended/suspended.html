<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tab Suspended</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      cursor: pointer;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 24px;
    }
    .icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      margin: 0 auto 16px;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
      word-break: break-word;
    }
    .url {
      font-size: 13px;
      color: #666;
      word-break: break-all;
      margin-bottom: 24px;
    }
    .restore {
      font-size: 14px;
      color: #34d399;
    }
    .hint {
      font-size: 12px;
      color: #444;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon" id="favicon-container">&#128164;</div>
    <h1 id="page-title">Tab Suspended</h1>
    <div class="url" id="page-url"></div>
    <div class="restore">Click anywhere to restore this tab</div>
    <div class="hint">This tab was suspended to save memory</div>
  </div>
  <script src="suspended.js"></script>
</body>
</html>
